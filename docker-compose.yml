version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: backslash_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"   # Neo4j browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
